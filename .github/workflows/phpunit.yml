name: phpunit

on: [push]

env:
  XDEBUG_MODE: coverage
  PHP_VERSION: 8.2

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out
        uses: actions/checkout@v6

      - name: Run Composer
        run: |
          docker run --rm --interactive --volume $GITHUB_WORKSPACE:/app composer/composer dump-autoload
      
      - name: Run PHPUnit
        run: |
          pwd
          
