name: phpunit

on: [push]

env:
  XDEBUG_MODE: coverage
  PHP_VERSION: 8.2

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: get-lo
        uses: php-actions/composer@v6
        run: |
          docker run --rm --it --tty --volume ${container_workdir}:/app composer/composer

      
